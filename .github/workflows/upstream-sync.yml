name: Upstream Engine Sync

on:
  schedule:
    - cron: "23 3 * * *"
  workflow_dispatch:
    inputs:
      release_tag:
        description: Stable Strix release tag; leave blank for latest
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: upstream-engine-sync
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-22.04
    timeout-minutes: 90
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
      - name: Configure upstream
        run: |
          git remote add upstream https://github.com/usestrix/strix.git 2>/dev/null || true
          git remote set-url upstream https://github.com/usestrix/strix.git

      - id: release
        name: Select stable release
        env:
          GH_TOKEN: ${{ github.token }}
          REQUESTED_TAG: ${{ inputs.release_tag }}
        run: |
          if [[ -n "$REQUESTED_TAG" ]]; then
            release_tag="$REQUESTED_TAG"
          else
            release_tag="$(gh api repos/usestrix/strix/releases/latest --jq .tag_name)"
          fi
          if [[ ! "$release_tag" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Refusing non-stable release tag: $release_tag" >&2
            exit 2
          fi
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "previous_tag=$(tr -d '[:space:]' < .lyrashield-upstream-release)" >> "$GITHUB_OUTPUT"
          echo "previous_base=$(tr -d '[:space:]' < .lyrashield-upstream-base)" >> "$GITHUB_OUTPUT"

      - id: reconcile
        name: Reconcile upstream release tree
        env:
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
          SYNC_REPORT_DIR: ${{ runner.temp }}/upstream-sync-report
        run: |
          set +e
          scripts/sync-upstream-release.sh "$RELEASE_TAG"
          status=$?
          set -e
          case "$status" in
            0)
              if [[ "$(grep '^needs_sync=' "$GITHUB_OUTPUT" | tail -1)" == "needs_sync=true" ]]; then
                echo "outcome=applied" >> "$GITHUB_OUTPUT"
              else
                echo "outcome=noop" >> "$GITHUB_OUTPUT"
              fi
              ;;
            20)
              echo "outcome=conflict" >> "$GITHUB_OUTPUT"
              ;;
            *)
              exit "$status"
              ;;
          esac

      - name: Upload conflict evidence
        if: steps.reconcile.outputs.outcome == 'conflict'
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: upstream-sync-${{ steps.release.outputs.release_tag }}-${{ github.run_id }}
          path: ${{ runner.temp }}/upstream-sync-report/
          if-no-files-found: error
          retention-days: 30

      - name: Create or update conflict issue
        if: steps.reconcile.outputs.outcome == 'conflict'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release.outputs.release_tag }}
        run: |
          title="Upstream sync blocked: $RELEASE_TAG"
          body="Tree-delta reconciliation found conflicts for $RELEASE_TAG. Review the conflict artifact attached to workflow run $GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID. The automation did not resolve or merge anything."
          gh label create upstream-sync --color 5319e7 --description "Upstream release reconciliation" --force
          issue_number="$(gh issue list --state open --label upstream-sync --json number,title --jq ".[] | select(.title == \"$title\") | .number" | head -1)"
          if [[ -n "$issue_number" ]]; then
            gh issue comment "$issue_number" --body "$body"
          else
            gh issue create --title "$title" --body "$body" --label upstream-sync
          fi

      - name: Stop after conflict escalation
        if: steps.reconcile.outputs.outcome == 'conflict'
        run: exit 1

      - id: branch
        name: Prepare review branch
        if: steps.reconcile.outputs.outcome == 'applied'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.reconcile.outputs.release_tag }}
          RELEASE_SHA: ${{ steps.reconcile.outputs.release_sha }}
        run: |
          branch="automation/upstream-${RELEASE_TAG}-${RELEASE_SHA:0:12}"
          echo "name=$branch" >> "$GITHUB_OUTPUT"
          existing="$(gh pr list --state open --head "$branch" --json number --jq 'length')"
          if [[ "$existing" != "0" ]]; then
            echo "existing=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "existing=false" >> "$GITHUB_OUTPUT"
          git switch -c "$branch"

      - name: Regenerate dependency lock
        if: steps.reconcile.outputs.outcome == 'applied' && steps.branch.outputs.existing == 'false'
        run: uv lock

      - name: Publish ready auto-merge PR
        if: steps.reconcile.outputs.outcome == 'applied' && steps.branch.outputs.existing == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          BRANCH: ${{ steps.branch.outputs.name }}
          RELEASE_TAG: ${{ steps.reconcile.outputs.release_tag }}
          RELEASE_SHA: ${{ steps.reconcile.outputs.release_sha }}
          PREVIOUS_TAG: ${{ steps.release.outputs.previous_tag }}
          PREVIOUS_BASE: ${{ steps.release.outputs.previous_base }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "sync: import upstream Strix $RELEASE_TAG"
          if git ls-remote --exit-code --heads origin "$BRANCH" >/dev/null 2>&1; then
            git push origin --delete "$BRANCH"
          fi
          git push --set-upstream origin "$BRANCH"
          changed_paths="$(git diff --name-only main...HEAD | sed 's/^/- `/' | sed 's/$/`/')"
          boundary_overlap="$(git diff --name-only main...HEAD | grep -E '^(lyrashield_adapter/|strix/|containers/|scripts/|pyproject.toml|uv.lock)' | sed 's/^/- `/' | sed 's/$/`/' || true)"
          if [[ -z "$boundary_overlap" ]]; then
            boundary_overlap="- None"
          fi
          cat > "$RUNNER_TEMP/upstream-pr.md" <<EOF
          Imports immutable Strix release [$RELEASE_TAG](https://github.com/usestrix/strix/releases/tag/$RELEASE_TAG) through the tree-delta path.

          | State | Release | Upstream commit |
          | --- | --- | --- |
          | Previous | \`$PREVIOUS_TAG\` | \`$PREVIOUS_BASE\` |
          | Candidate | \`$RELEASE_TAG\` | \`$RELEASE_SHA\` |

          ## Required proof

          The read-only **Engine CI / verify** check must prove source quality, Python packaging, the native binary, the real sandbox runtime, and the public LyraShield worker contract. Candidate code never runs with repository write credentials.

          ## LyraShield boundary overlap

          $boundary_overlap

          <details><summary>All changed paths</summary>

          $changed_paths

          </details>

          Approve this PR to let GitHub squash-merge it automatically after the required check is green. No deployment occurred.
          EOF
          pr_url="$(gh pr create \
            --title "sync: upstream Strix $RELEASE_TAG" \
            --body-file "$RUNNER_TEMP/upstream-pr.md" \
            --base main \
            --head "$BRANCH")"
          pr_number="$(gh pr view "$pr_url" --json number --jq .number)"
          gh api --method POST "repos/$GITHUB_REPOSITORY/pulls/$pr_number/requested_reviewers" \
            -f 'reviewers[]=ecryptoguru'
          gh pr merge --auto --squash "$pr_url"
