name: Engine CI

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: engine-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "22"
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Verify source and policy gates
        run: scripts/verify-thin-fork.sh

      - name: Verify Python packages and CLI
        run: |
          uv build
          uv run lyrashield --version

      - name: Verify native release binary
        run: bash scripts/build.sh

      - name: Build sandbox image
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: containers/Dockerfile
          tags: lyrashield-sandbox:ci
          load: true
          cache-from: type=gha,scope=lyrashield-sandbox
          cache-to: type=gha,mode=max,scope=lyrashield-sandbox

      - name: Smoke sandbox image
        run: |
          docker run --rm lyrashield-sandbox:ci sh -lc '
            test "$(id -u)" != "0" &&
            test "$(pwd)" = "/workspace" &&
            test -f /app/certs/ca.p12 &&
            test ! -S /var/run/docker.sock &&
            test "$VIRTUAL_ENV" = "/app/.venv" &&
            test "$HTTP_PROXY" = "http://127.0.0.1:48080" &&
            caido-cli --version &&
            command -v nmap >/dev/null &&
            /app/.venv/bin/python -c "import caido_api" &&
            status="$(curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:48080/graphql/)" &&
            case "$status" in 200|400) exit 0 ;; *) exit 1 ;; esac
          '

      - name: Check out public LyraShield app contract
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          repository: ecryptoguru/lyrashield-ai
          path: .ci/lyrashield-ai
          fetch-depth: 1
          persist-credentials: false

      - name: Verify worker compatibility
        run: scripts/verify-worker-contract.sh "$GITHUB_WORKSPACE/.ci/lyrashield-ai"

      - name: Upload release diagnostics
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: engine-ci-diagnostics-${{ github.run_id }}
          path: |
            dist/
            build/
          if-no-files-found: ignore
          retention-days: 7
